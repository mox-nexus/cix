# Stream A: Human memory and cognition — recon collection config.
#
# Scope: research/stream-a-human-memory/scope.md
# Inventory: research/stream-a-human-memory/sources/inventory.md
#
# Sources: Semantic Scholar + OpenAlex.
# - arXiv dropped: returns ML papers about "episodic memory" in neural-network
#   sense, not cognitive science. Reserve for Stream B (LLMs and memory).
# - Zenodo dropped: returns datasets and supplementary materials, not papers.
#
# OpenAlex normalize spec fixed from upstream: was `title: display_name` but
# the explicit `select` only includes `title`, so display_name was always null.
# Changed to `title: title`. Upstream bug report belongs on
# plugins/craft-research/skills/collecting/references/research-catalog.yaml.
#
# Env vars: S2_API_KEY and OPENALEX_API_KEY both optional. Currently unset;
# survey runs unauthenticated (tighter S2 rate limit, OpenAlex public pool).
#
# Query set: 12 queries × 2 sources = 24 collectors covering RQ0-RQ4.
# Priority-2 families (phenomenology, semiotics, extended cognition, PKM
# lineage) deferred to a second sweep after reviewing first results.
#
# Limit: 25 records per query per source. Total survey volume ~600 records.
# Rate limit: ~15 seconds total survey time (S2 bottleneck).

catalog:
  - name: semantic-scholar
    type: api
    url: https://api.semanticscholar.org/graph/v1
    auth: { header: x-api-key, env: S2_API_KEY }
    rate_limit: { rps: 0.33, burst: 1 }

  - name: openalex
    type: api
    url: https://api.openalex.org
    auth: { param: api_key, env: OPENALEX_API_KEY }
    rate_limit: { rps: 10, burst: 5 }
    user_agent: "recon/0.7.0 (mailto:yza@mox.nexus)"

collectors:

  # =====================================================================
  # RQ0 — Baseline: what does cognitive science say about human memory?
  # =====================================================================

  - name: s2-rq0-episodic-review
    type: api
    source: semantic-scholar
    endpoint: /paper/search
    params:
      query: "episodic memory review"
      limit: "25"
      fields: "title,abstract,year,authors,citationCount,openAccessPdf,venue"
    extract: "data"
    normalize:
      title: title
      abstract: abstract
      authors: "authors.*.name"
      year: year
      citations: citationCount
      pdf_url: "openAccessPdf.url"
      venue: venue

  - name: openalex-rq0-episodic-review
    type: api
    source: openalex
    endpoint: /works
    params:
      search: "episodic memory review"
      per_page: "25"
      select: "id,title,doi,publication_year,cited_by_count,authorships,open_access,abstract_inverted_index,primary_location"
    extract: "results"
    normalize:
      title: title
      abstract: "abstract_inverted_index|$inverted_index"
      authors: "authorships.*.author.display_name"
      year: publication_year
      citations: cited_by_count
      pdf_url: "open_access.oa_url"
      venue: "primary_location.source.display_name"
      source_id: id

  - name: s2-rq0-consolidation
