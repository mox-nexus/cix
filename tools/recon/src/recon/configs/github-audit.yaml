# GitHub audit — snapshot a repository's state via the GitHub REST API.
#
# Demonstrates:
#   • api source with optional header auth
#   • path-level placeholder substitution ({owner}, {repo})
#   • multiple collectors hitting one source
#   • normalize specs unpacking nested JSON
#
# Auth (optional but recommended — raises rate limit from 60/hr to 5000/hr):
#
#   export GITHUB_TOKEN=ghp_xxxxxxxxxxxxxxxxxxxx
#
# The `auth.prefix: "Bearer "` below prepends the required auth scheme
# to the raw token before it becomes the Authorization header value.
# For legacy classic PATs you can use `prefix: "token "` instead.
#
# Usage:
#   recon init gh-audit --template github-audit
#   # edit {owner} and {repo} placeholders below (in params, twice each)
#   # export GITHUB_TOKEN if you have one
#   recon survey gh-audit

catalog:
  - name: github
    type: api
    url: https://api.github.com
    auth:
      header: Authorization
      env: GITHUB_TOKEN
      prefix: "Bearer "
    rate_limit: { rps: 0.5, burst: 2 }
    user_agent: "recon/0.8.0"
    timeout: 60

collectors:
  - name: recent-issues
    type: api
    source: github
    endpoint: /repos/{owner}/{repo}/issues
    params:
      owner: "{owner}"   # <-- edit: repo owner (user or org)
      repo: "{repo}"     # <-- edit: repo name
      state: all
      per_page: "20"
      sort: updated
      direction: desc
    normalize:
      number: number
      title: title
      state: state
      author: "user.login"
      created: created_at
      updated: updated_at
      labels: "labels.*.name"
      url: html_url

  - name: recent-prs
    type: api
    source: github
    endpoint: /repos/{owner}/{repo}/pulls
    params:
      owner: "{owner}"   # <-- edit
      repo: "{repo}"     # <-- edit
      state: all
      per_page: "20"
      sort: updated
      direction: desc
    normalize:
      number: number
      title: title
      state: state
      merged_at: merged_at
      author: "user.login"
      base: "base.ref"
      head: "head.ref"
      url: html_url

  - name: releases
    type: api
    source: github
    endpoint: /repos/{owner}/{repo}/releases
    params:
      owner: "{owner}"   # <-- edit
      repo: "{repo}"     # <-- edit
      per_page: "10"
    normalize:
      tag: tag_name
      name: name
      published: published_at
      author: "author.login"
      prerelease: prerelease
      draft: draft
      url: html_url
