# Example: multi-repo code mining via fan-out
#
# Use case: survey patterns across several local repositories. Each collector
# runs against every catalog entry, producing one JSONL per (collector, repo)
# pair.
#
# Adapt by editing the catalog to point at real local paths, then:
#   recon survey code-mining
#   recon query code-mining "SELECT * FROM scars_tokio WHERE content LIKE '%SAFETY%'"
#
# Each collector's source.url is used as cwd for the shell command, so commands
# like `rg`, `git log`, etc. run inside each repo automatically.

catalog:
  - name: tokio
    type: local
    url: /Users/dev/oss/tokio

  - name: bytes
    type: local
    url: /Users/dev/oss/bytes

  - name: hyper
    type: local
    url: /Users/dev/oss/hyper

collectors:
  # Pattern 1 — safety annotations in Rust code ("scars" of hard-won knowledge)
  - name: scars
    type: cli
    # no source: → fans out across every catalog entry
    run: "rg --json -C3 'SAFETY|INVARIANT|must not|be careful|critical' --type rust"
    normalize:
      file: "data.path.text"
      line: "data.line_number"
      content: "data.lines.text|$first"

  # Pattern 2 — revert commits (architectural oscillations)
  - name: reverts
    type: cli
    run: "git log --oneline --all --grep=revert -n 50"

  # Pattern 3 — public API surface (signatures)
  - name: api-surface
    type: cli
    run: "rg --json 'pub (fn|struct|trait|enum|type)' --type rust"
    normalize:
      file: "data.path.text"
      line: "data.line_number"
      content: "data.lines.text|$first"

  # Pattern 4 — unsafe count per file (quantitative census)
  - name: unsafe-census
    type: cli
    run: "rg --json 'unsafe' --type rust --count-matches"

  # Pattern 5 — forensic analysis via code-maat (Adam Tornhill)
  # https://github.com/adamtornhill/code-maat
  #
  # Install: `brew install code-maat` or download the standalone jar.
  # code-maat emits CSV; the tail pipes it through a tiny python one-liner
  # that converts each row into a JSON object. Recon then normalizes per
  # the collector's spec.
  #
  # Use mktemp so fan-out across repos doesn't collide on the logfile path.
  - name: hotspots
    type: cli
    run: |
      LOG=$(mktemp)
      git log --all --numstat --date=short --pretty=format:'--%h--%ad--%aN' --no-renames > "$LOG"
      maat -l "$LOG" -c git2 -a revisions | \
        python3 -c "import csv,json,sys; [print(json.dumps(r)) for r in csv.DictReader(sys.stdin)]"
      rm -f "$LOG"

  # code-maat can run many analyses against the same logfile. Swap `-a` for
  # coupling (files that change together), age (days since last change),
  # entity-effort (who contributed what), main-dev (primary contributor),
  # or communication (knowledge distribution).
  - name: coupling
    type: cli
    run: |
      LOG=$(mktemp)
      git log --all --numstat --date=short --pretty=format:'--%h--%ad--%aN' --no-renames > "$LOG"
      maat -l "$LOG" -c git2 -a coupling | \
        python3 -c "import csv,json,sys; [print(json.dumps(r)) for r in csv.DictReader(sys.stdin)]"
      rm -f "$LOG"

# Produces per catalog entry, per collector:
#   scars-tokio.jsonl, scars-bytes.jsonl, scars-hyper.jsonl
#   reverts-tokio.jsonl, reverts-bytes.jsonl, reverts-hyper.jsonl
#   api-surface-tokio.jsonl, ...
#   unsafe-census-tokio.jsonl, ...
#
# Cross-repo SQL query example (via `recon query`):
#   SELECT 'tokio' AS repo, count(*) AS scars FROM scars_tokio
#   UNION ALL SELECT 'bytes', count(*) FROM scars_bytes
#   UNION ALL SELECT 'hyper', count(*) FROM scars_hyper
#   ORDER BY scars DESC
