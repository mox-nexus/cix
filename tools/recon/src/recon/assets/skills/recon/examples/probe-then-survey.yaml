#       title: display_name                             # direct rename
#       authors: "authorships.*.author.display_name"    # deep list-map
#       year: publication_year
#       abstract: "abstract_inverted_index|$inverted_index"  # transform
#       venue: "primary_location.source.display_name"

# ============================================================================
# STAGE 3 — SURVEY (production run)
# ============================================================================
# Normalize spec validated. Bump per_page to production value and run.
