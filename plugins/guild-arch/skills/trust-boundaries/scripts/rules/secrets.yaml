# Secret-leak Semgrep rules.
#
# Complements Gitleaks (which covers a much broader pattern set and scans git
# history). These rules exist to fire during IDE / pre-commit semgrep runs
# on the working tree.
#
# Not a substitute for Gitleaks + server-side push protection.

rules:
  - id: hardcoded-api-key-assignment
    pattern-either:
      - pattern: |
          $KEY = "sk-$REST"
      - pattern: |
          $KEY = "sk_live_$REST"
      - pattern: |
          $KEY = "sk_test_$REST"
      - pattern: |
          $KEY = "ghp_$REST"
      - pattern: |
          $KEY = "github_pat_$REST"
      - pattern: |
          $KEY = "xoxb-$REST"
      - pattern: |
          $KEY = "AKIA$REST"
    message: |
      Hardcoded API key or token detected. Move to environment variable or secret manager.
      Fix (class elimination): use a typed Secret wrapper so serialization / logging fails loudly.
      Related: Gitleaks + push protection should prevent this from reaching history.
    severity: ERROR
    languages: [python, javascript, typescript, go, ruby, java]

  - id: hardcoded-password-field
    pattern-either:
      - pattern: password = "..."
      - pattern: passwd = "..."
      - pattern: db_password = "..."
    pattern-not: password = ""
    pattern-not: password = None
    pattern-not: password = null
    message: |
      Hardcoded password in source. Move to a secret manager (Vault, AWS Secrets Manager, macOS Keychain).
    severity: WARNING
    languages: [python, javascript, typescript, go, ruby]

  - id: aws-access-key-pattern
    pattern-regex: '(?i)aws[_-]?(access[_-]?)?key[_-]?(id)?\s*[:=]\s*["\047]?AKIA[0-9A-Z]{16}'
    message: |
      AWS access key ID in source. Rotate immediately, move to IAM roles or AWS SSO.
    severity: ERROR
    languages: [generic]
    paths:
      exclude:
        - "*.md"
        - "*.rst"

  - id: private-key-in-source
    pattern-either:
      - pattern-regex: '-----BEGIN (RSA |EC |OPENSSH |DSA |PGP )?PRIVATE KEY-----'
    message: |
      Private key material committed to source. Rotate immediately. Use an HSM, KMS, or secret manager instead.
    severity: ERROR
    languages: [generic]
    paths:
      exclude:
        - "*.md"
        - "test/**"
        - "tests/**"
        - "fixtures/**"
