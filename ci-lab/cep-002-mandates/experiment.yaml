name: cep-002-mandates
description: |
  Does prescribing HOW help, hurt, or not matter?
  Hypothesis: Motivations (explaining WHY) outperform mandates (prescribing HOW)
  on judgment-heavy tasks, measured by code correctness on discriminating test cases.
  Design: 1 task × 6 conditions × N trials. Independent variable = system prompt framing.
  From lab-1337 research on the WHY > HOW principle.

# Subjects loaded from subjects/ directory (6 conditions on the autonomy spectrum):
#   01-baseline, 02-full-autonomy, 03-motivation,
#   04-principle-guided, 05-mandate-template, 06-highly-structured

agent:
  model: sonnet
  max_tokens: 4096

sensor: function-test
trials: 10

# Ixian protocol: phased execution
# Phase 0: baseline × 10 (noise floor) — gate: std_dev < 0.25, mean in [0.10, 0.90]
# Phase 1: baseline + motivation + highly-structured × 10 (3-condition pilot)
#           gate: P(motivation > highly_structured) > 0.70
# Phase 2: all 6 conditions × 10 (full matrix) — only if Phase 1 shows signal
