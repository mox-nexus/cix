name: skill-activation
description: >
  Does each marketplace skill activate for its intended prompts?
  Tests all 27 skills across 6 plugins. Each probe targets one skill
  with a natural-language prompt matching its trigger description.
  Negative probes test discrimination (no skill should fire).
  Repeats measure noise floor (sd of pass_rate across runs).
sensor:
  type: activation
trials: 3
repeats: 3
